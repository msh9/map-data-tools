name: Python Utilities CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/python-utilities-ci.yml"
      - "faa-tools/dof2geojson/**"
      - "faa-tools/faa-vfr-fetch/**"
      - "faa-tools/faa-static-data/**"
      - "faa-tools/nasr-aixm2geojson/**"
      #- "sentinel-mosaic/**" -- commented out due to GDAL dependency; TODO how to auto-test
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/python-utilities-ci.yml"
      - "faa-tools/dof2geojson/**"
      - "faa-tools/faa-vfr-fetch/**"
      - "faa-tools/faa-static-data/**"
      - "faa-tools/nasr-aixm2geojson/**"
      #- "sentinel-mosaic/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  poetry-utilities:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dof2geojson
            path: faa-tools/dof2geojson
          - name: faa-vfr-fetch
            path: faa-tools/faa-vfr-fetch
          - name: nasr-aixm2geojson
            path: faa-tools/nasr-aixm2geojson
          #- name: sentinel-mosaic
            #path: sentinel-mosaic
    defaults:
      run:
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Poetry
        run: python -m pip install --upgrade pip poetry

      - name: Configure in-project virtualenv
        run: poetry config virtualenvs.in-project true

      - name: Restore virtualenv cache
        uses: actions/cache@v5
        with:
          path: ${{ matrix.path }}/.venv
          key: venv-${{ runner.os }}-py312-${{ matrix.name }}-${{ hashFiles(format('{0}/poetry.lock', matrix.path)) }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Lint
        run: poetry run ruff check .

      - name: Test
        run: poetry run pytest

  faa-static-data:
    name: faa-static-data
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: faa-tools/faa-static-data

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install lint tool
        run: python -m pip install --upgrade pip ruff

      - name: Lint
        run: ruff check .

      - name: Test
        run: python -m unittest discover -s tests -p "test_*.py"
